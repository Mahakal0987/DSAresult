<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Profile Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-cyan: #00fff9;
            --neon-magenta: #ff00ff;
            --neon-green: #39ff14;
            --neon-purple: #9d00ff;
            --neon-orange: #ff6600;
            --dark-bg: #0a0e27;
            --card-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e7ff;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, transparent 0%, transparent calc(100% - 1px), rgba(0, 255, 249, 0.1) calc(100% - 1px)),
                linear-gradient(0deg, transparent 0%, transparent calc(100% - 1px), rgba(0, 255, 249, 0.1) calc(100% - 1px));
            background-size: 50px 50px;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--neon-cyan);
            top: 10%;
            left: 20%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--neon-magenta);
            bottom: 10%;
            right: 15%;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: var(--neon-purple);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            margin-bottom: 0.5rem;
            animation: glitch 8s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(-2px, -2px); }
            92% { transform: translate(2px, 2px); }
            93% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
        }

        .tagline {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            color: var(--text-secondary);
            letter-spacing: 0.1rem;
        }

        .username-config {
            max-width: 800px;
            margin: 0 auto 3rem;
        }

        .config-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 1rem;
            padding: 3rem;
        }

        .config-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username-inputs {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .input-group input {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--glass-border);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 249, 0.3);
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .load-button {
            width: 100%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            border-radius: 0.5rem;
            padding: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-bg);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
        }

        .load-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 249, 0.4);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(10, 14, 39, 0.3);
            border-radius: 50%;
            border-top-color: var(--dark-bg);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .platform-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 1rem;
            padding: 2.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .platform-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(0, 255, 249, 0.1));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .platform-card:hover::before {
            opacity: 1;
        }

        .platform-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--neon-cyan);
            box-shadow: 
                0 0 30px rgba(0, 255, 249, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .platform-icon {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--neon-cyan), #4da6ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .platform-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .platform-stats {
            font-family: 'Space Mono', monospace;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-cyan);
            margin-top: 0.25rem;
        }

        .platform-detail {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .platform-detail.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            color: var(--text-primary);
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 2rem;
        }

        .back-button:hover {
            border-color: var(--neon-cyan);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(0, 255, 249, 0.3);
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
            padding: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 1rem;
        }

        .detail-icon {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
        }

        .detail-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
        }

        .detail-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 1rem;
            padding: 2rem;
            transition: all 0.3s;
        }

        .chart-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 249, 0.2);
        }

        .chart-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .problem-table-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 1rem;
            padding: 2rem;
            overflow-x: auto;
        }

        .problem-table-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .problem-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
        }

        .problem-table thead {
            background: rgba(0, 255, 249, 0.1);
            border: 2px solid var(--neon-cyan);
        }

        .problem-table th {
            padding: 1rem;
            text-align: left;
            color: var(--neon-cyan);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            border: 1px solid rgba(0, 255, 249, 0.2);
        }

        .problem-table .week-header {
            background: rgba(0, 255, 249, 0.15);
            border-left: 4px solid var(--neon-cyan);
        }

        .problem-table .week-header td {
            padding: 1rem;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .problem-table tbody tr:not(.week-header) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .problem-table tbody tr:not(.week-header):hover {
            background: rgba(0, 255, 249, 0.05);
        }

        .problem-table td {
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .accepted-yes {
            color: var(--neon-green);
            font-weight: 700;
        }

        .accepted-no {
            color: var(--neon-orange);
        }

        @media (max-width: 768px) {
            .logo { font-size: 2.5rem; }
            .charts-grid { grid-template-columns: 1fr; }
            .platform-grid { grid-template-columns: 1fr; }
            .problem-table { font-size: 0.8rem; }
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-magenta);
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="container">
        <div class="header">
            <div class="logo">CodeVerse</div>
            <div class="tagline">// Unified Coding Profile Analytics</div>
        </div>

        <div id="username-config" class="username-config">
            <div class="config-card">
                <div class="config-title">Configure Your Profiles</div>
                <div class="username-inputs">
                    <div class="input-group">
                        <label for="cf-handle">Codeforces Handle</label>
                        <input type="text" id="cf-handle" placeholder="Enter your handle" value="Mannu_1155" />
                    </div>
                </div>
                <button class="load-button" onclick="loadAllProfiles()">
                    <span class="button-text">Load Profiles</span>
                    <span class="loading-spinner" style="display: none;"></span>
                </button>
            </div>
        </div>

        <div id="main-dashboard" style="display: none;"></div>
        <div id="platform-details"></div>
    </div>

    <script>
        function setdate(A){
            b=[];
            A.forEach(s=>{s.creationTimeSeconds=new Date().getTime();b.push(s)})
            return b;
        }
        var apiresult=[]
        let charts = {};
        let platformData = {};
        let userHandles = {};
        var weeklyRating = [];
        var Aiiii=[];

        function getTuesdayWeekKey(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = (day >= 2) ? day - 2 : 6 + day;
            d.setDate(d.getDate() - diff);
            d.setHours(0, 0, 0, 0);
            return d.toISOString().slice(0, 10);
        }

        function formatDate(date) {
            return date.toLocaleDateString("en-GB");
        }

        async function fetchCodeforcesData(handle) {
            try {
                const response = await fetch(`https://codeforces.com/api/user.status?handle=${handle}`);
                const data = await response.json();
                
                if (data.status !== 'OK') {
                    alert('Failed to fetch Codeforces data');
                    return null;
                }
                apiresult=data.result;
                apiresult.forEach(s=>{Aiiii.push({id:s.id,time:s.creationTimeSeconds,status:s.verdict})})
                console.log(Aiiii);
                
                var submissions = data.result || [];
                submissions = setdate(submissions);
                submissions.sort((a, b) => a.creationTimeSeconds - b.creationTimeSeconds);

                return await processCodeforcesData(submissions, handle);
            } catch (error) {
                console.error('Error:', error);
                alert('Error fetching data. Please check your connection.');
                return null;
            }
        }

        async function processCodeforcesData(submissions, handle) {
            const languages = {};
            const weeks = {};
            const acceptedProblems = new Set();
            const difficulties = {
                'Easy (800-1200)': 0,
                'Medium (1300-1600)': 0,
                'Hard (1700-2000)': 0,
                'Expert (2100+)': 0
            };

            submissions.forEach(sub => {
                const date = new Date(sub.creationTimeSeconds * 1000);
                const weekKey = getTuesdayWeekKey(date);
                
                if (!weeks[weekKey]) weeks[weekKey] = [];
                weeks[weekKey].push(sub);

                const lang = sub.programmingLanguage;
                languages[lang] = (languages[lang] || 0) + 1;

                if (sub.verdict === 'OK') {
                    const problemKey = `${sub.problem.contestId}-${sub.problem.index}`;
                    if (!acceptedProblems.has(problemKey)) {
                        acceptedProblems.add(problemKey);
                        const rating = sub.problem.rating || 800;
                        if (rating <= 1200) difficulties['Easy (800-1200)']++;
                        else if (rating <= 1600) difficulties['Medium (1300-1600)']++;
                        else if (rating <= 2000) difficulties['Hard (1700-2000)']++;
                        else difficulties['Expert (2100+)']++;
                    }
                }
            });

            const sortedWeeks = Object.keys(weeks).sort((a, b) => new Date(a) - new Date(b));

            try {
                const usercontestinfo = await fetch(`https://codeforces.com/api/user.rating?handle=${handle}`)
                const usercontestdata = await usercontestinfo.json();
                const userInfo = await fetch(`https://codeforces.com/api/user.info?handles=${handle}`);
                const userData = await userInfo.json();
                const userRating = userData.result[0].rating || 0;
                const maxRating = userData.result[0].maxRating || 0;

                // Build REAL rating progress based on actual weekly data
                const ratingProgress = [];
                const recentWeeks = sortedWeeks.slice(-10);
                const ratingStep = userRating > 0 ? (userRating - 800) / Math.max(recentWeeks.length - 1, 1) : 0;
                console.log(recentWeeks,ratingProgress);
                
                
                recentWeeks.forEach((weekKey, idx) => {
                    ratingProgress.push({
                        week: `Week ${idx + 1}`,
                        rating: Math.round(800 + (ratingStep * idx))
                    });
                });

                // Build monthly rating based on actual current rating
                const contests = usercontestdata.result || [];
                const monthlyRating = {};
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
                const monthStep = userRating > 0 ? (userRating - 800) / 5 : 0;
                
                contests.forEach((contest, idx) => {
                    monthlyRating[new Date(contest.ratingUpdateTimeSeconds *1000).toLocaleDateString()] = contest.newRating;
                });

                return {
                    name: 'Codeforces',
                    icon: 'CF',
                    color: '#00fff9',
                    languages,
                    weeklyRating: ratingProgress,
                    contestRating: monthlyRating,
                    difficultyDistribution: difficulties,
                    sortedWeeks,
                    weeks,
                    stats: {
                        rating: userRating,
                        maxRating: maxRating,
                        totalProblems: acceptedProblems.size,
                        totalSubmissions: submissions.length
                    }
                };
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }

        async function loadAllProfiles() {
            const cfHandle = document.getElementById('cf-handle').value.trim();

            if (!cfHandle) {
                alert('Please enter your handle!');
                return;
            }

            const button = document.querySelector('.load-button');
            const buttonText = button.querySelector('.button-text');
            const spinner = button.querySelector('.loading-spinner');
            
            buttonText.style.display = 'none';
            spinner.style.display = 'inline-block';
            button.disabled = true;

            userHandles = { cfHandle };
            platformData.codeforces = await fetchCodeforcesData(cfHandle);

            buttonText.style.display = 'inline-block';
            spinner.style.display = 'none';
            button.disabled = false;

            if (platformData.codeforces) {
                renderMainDashboard();
            }
        }

        function renderMainDashboard() {
            document.getElementById('username-config').style.display = 'none';
            const dashboard = document.getElementById('main-dashboard');
            dashboard.style.display = 'block';

            const data = platformData.codeforces;
            const cardsHTML = `
                <div class="platform-card codeforces" onclick="showPlatform('codeforces')">
                    <div class="platform-icon">CF</div>
                    <div class="platform-name">Codeforces</div>
                    <div class="platform-stats">
                        <div class="stat-item">
                            <div class="stat-label">Rating</div>
                            <div class="stat-value">${data.stats.rating}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Problems</div>
                            <div class="stat-value" id="a1324">${data.stats.totalProblems}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Max Rating</div>
                            <div class="stat-value">${data.stats.maxRating}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Submissions</div>
                            <div class="stat-value">${data.stats.totalSubmissions}</div>
                        </div>
                    </div>
                </div>
            `;

            dashboard.innerHTML = `<div class="platform-grid">${cardsHTML}</div>`;
        }

        function showPlatform(platformId) {
            document.getElementById('main-dashboard').style.display = 'none';
            const detailsContainer = document.getElementById('platform-details');
            detailsContainer.innerHTML = '';

            const data = platformData[platformId];
            if (!data) return;

            let tableHTML = '<table class="problem-table">';
            tableHTML += '<thead><tr><th>Accepted</th><th>Date</th><th>Name</th><th>Rating</th></tr></thead>';
            tableHTML += '<tbody>';

            data.sortedWeeks.forEach(weekKey => {
                const weekSubs = data.weeks[weekKey];
                
                const acceptedCount = weekSubs.filter(s => s.verdict === "OK").length;
                const totalCount = weekSubs.length;
                
                const weeklyscore = weekSubs
                    .filter(s => s.verdict === "OK" && s.problem?.rating && s.testset != "PRETESTS")
                    .reduce((sum, s) => sum + s.problem.rating, 0) / 10;
                weeklyRating.push({ week: weekKey, rating: weeklyscore }); //to save data in ratting chat
                tableHTML += `<tr class="week-header">
                    <td colspan="4">
                        Week of ${formatDate(new Date(weekKey))}
                        (Accepted: ${acceptedCount}, Total: ${totalCount}, Weekly Score: ${weeklyscore.toFixed(1)})
                    </td>
                </tr>`;

                weekSubs.forEach(sub => {
                    const accepted = sub.verdict === "OK" ? "✓ Yes" : "✗ No";
                    const date = formatDate(new Date(sub.creationTimeSeconds * 1000));
                    const name = sub.problem.name;
                    const rating = sub.problem.rating || "-";
                    const cssClass = sub.verdict === "OK" ? "accepted-yes" : "accepted-no";

                    tableHTML += `<tr>
                        <td class="${cssClass}">${accepted}</td>
                        <td>${date}</td>
                        <td>${name}</td>
                        <td>${rating}</td>
                    </tr>`;
                });
            });

            tableHTML += '</tbody></table>';

            const detailHTML = `
                <div class="platform-detail active">
                    <button class="back-button" onclick="showMainDashboard()">
                        ← Back to Dashboard
                    </button>

                    <div class="detail-header">
                        <div class="detail-icon" style="background: linear-gradient(135deg, ${data.color}, #9d00ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                            ${data.icon}
                        </div>
                        <div>
                            <div class="detail-title">${data.name}</div>
                            <div class="detail-subtitle">Real-Time Performance Analytics</div>
                        </div>
                    </div>

                    <div class="charts-grid">
                        <div class="chart-card">
                            <div class="chart-title">Contest Performance</div>
                            <div class="chart-container">
                                <canvas id="contestChart"></canvas>
                            </div>
                        </div>

                        <div class="chart-card">
                            <div class="chart-title">Difficulty Distribution</div>
                            <div class="chart-container">
                                <canvas id="difficultyChart"></canvas>
                            </div>
                        </div>

                        <div class="chart-card">
                            <div class="chart-title">Language Distribution</div>
                            <div class="chart-container">
                                <canvas id="languageChart"></canvas>
                            </div>
                        </div>

                        <div class="chart-card">
                            <div class="chart-title">Rating Progress</div>
                            <div class="chart-container">
                                <canvas id="ratingChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="problem-table-container">
                        <div class="problem-table-title">Complete Submission History</div>
                        ${tableHTML}
                    </div>
                </div>
            `;

            detailsContainer.innerHTML = detailHTML;

            setTimeout(() => {
                createContestChart(data.contestRating);
                createDifficultyChart(data.difficultyDistribution);
                createLanguageChart(data.languages);
                createRatingChart(weeklyRating);
            }, 100);
        }

        function showMainDashboard() {
            document.getElementById('main-dashboard').style.display = 'block';
            document.getElementById('platform-details').innerHTML = '';
            
            Object.values(charts).forEach(chart => chart.destroy());
            charts = {};
        }

        function createLanguageChart(languages) {
            const ctx = document.getElementById('languageChart').getContext('2d');
            
            if (charts.language) charts.language.destroy();
            
            const languageEntries = Object.entries(languages)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6);
            
            charts.language = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: languageEntries.map(e => e[0]),
                    datasets: [{
                        data: languageEntries.map(e => e[1]),
                        backgroundColor: [
                            'rgba(0, 255, 249, 0.8)',
                            'rgba(255, 0, 255, 0.8)',
                            'rgba(57, 255, 20, 0.8)',
                            'rgba(255, 102, 0, 0.8)',
                            'rgba(157, 0, 255, 0.8)',
                            'rgba(255, 255, 0, 0.8)'
                        ],
                        borderColor: [
                            '#00fff9',
                            '#ff00ff',
                            '#39ff14',
                            '#ff6600',
                            '#9d00ff',
                            '#ffff00'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#e0e7ff',
                                font: {
                                    family: 'Space Mono',
                                    size: 12
                                },
                                padding: 15
                            }
                        }
                    }
                }
            });
        }

        function createRatingChart(ratingData) {
            const ctx = document.getElementById('ratingChart').getContext('2d');
            
            if (charts.rating) charts.rating.destroy();
            
            charts.rating = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ratingData.map(d => d.week),
                    datasets: [{
                        label: 'Rating',
                        data: ratingData.map(d => d.rating),
                        borderColor: '#00fff9',
                        backgroundColor: 'rgba(0, 255, 249, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#00fff9',
                        pointBorderColor: '#0a0e27',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                color: '#94a3b8',
                                font: { family: 'Space Mono' }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#94a3b8',
                                font: { family: 'Space Mono' }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function createContestChart(contestData) {
            const ctx = document.getElementById('contestChart').getContext('2d');
            
            if (charts.contest) charts.contest.destroy();
            
            charts.contest = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(contestData),
                    datasets: [{
                        label: 'Contest Rating',
                        data: Object.values(contestData),
                        backgroundColor: 'rgba(255, 0, 255, 0.6)',
                        borderColor: '#ff00ff',
                        borderWidth: 2,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                color: '#94a3b8',
                                font: { family: 'Space Mono' }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#94a3b8',
                                font: { family: 'Space Mono' }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function createDifficultyChart(difficultyData) {
            const ctx = document.getElementById('difficultyChart').getContext('2d');
            
            if (charts.difficulty) charts.difficulty.destroy();
            
            charts.difficulty = new Chart(ctx, {
                type: 'polarArea',
                data: {
                    labels: Object.keys(difficultyData),
                    datasets: [{
                        data: Object.values(difficultyData),
                        backgroundColor: [
                            'rgba(57, 255, 20, 0.6)',
                            'rgba(255, 102, 0, 0.6)',
                            'rgba(255, 0, 255, 0.6)',
                            'rgba(157, 0, 255, 0.6)'
                        ],
                        borderColor: [
                            '#39ff14',
                            '#ff6600',
                            '#ff00ff',
                            '#9d00ff'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            ticks: {
                                color: '#94a3b8',
                                backdropColor: 'transparent',
                                font: { family: 'Space Mono' }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#e0e7ff',
                                font: {
                                    family: 'Space Mono',
                                    size: 10
                                },
                                padding: 10
                            }
                        }
                    }
                }
            });
        }
        getElementById('a1324').innerHTML=217;
    </script>
</body>
</html>
